kind = "mobile"
previewPath = "/"
title = "MRZ Scanner"
version = "1.0.0"
id = "artifacts/mrz-scanner"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23040

[services.development]
run = "pnpm --filter @workspace/mrz-scanner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mrz-scanner", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mrz-scanner", "run", "serve" ]

[services.env]
PORT = "23040"
BASE_PATH = "/"
